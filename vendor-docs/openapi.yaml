openapi: 3.0.1
info:
  version: 1.0.0
  title: Airthings for Consumer API
  description: The Airthings for Consumer API provides secure and authorized access for Airthings consumers to retrieve the latest data from their Airthings air quality monitors. Leveraging HTTPS and OAuth for enhanced security, this API empowers users to seamlessly access real-time information from their Airthings devices, gaining valuable insights into the air quality within their environments.
  contact:
    email: support@airthings.com
externalDocs:
  description: Find out more about consumerAPI
  url: https://consumer-api-doc.airthings.com/
servers:
  - url: https://consumer-api.airthings.com
    description: Airthings for Consumer API (prod)

paths:
  /v1/accounts/{accountId}/sensors:
    get:
      summary: Get sensors for a set of devices
      description: |
        Get sensors for a set of devices. The response will contain the latest sensor values for the devices.
        The sensor values are updated depending on the device types sampling rate.
        It is recommended to poll the API at a regular interval to get the latest sensor values.
        The response will be paginated with a maximum of 50 records per page.
      operationId: getMultipleSensors
      parameters:
        - $ref: '#/components/parameters/deviceSerialNumbers'
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/pageNumber'
        - $ref: '#/components/parameters/unit'
      tags:
        - Sensor
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Request limit per hour.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: The number of requests left for the time window.
            X-RateLimit-Reset:
              schema:
                type: string
                format: timestamp
              description: The timestamp at which the current rate limit window resets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SensorsResponse'
                  hasNext:
                    type: boolean
                    description: True if next pages can be fetched, false otherwise.
                  totalPages:
                    type: integer
        429:
          description: Rate limit exceeded
          headers:
            X-RateLimit-Retry-After:
              schema:
                type: string
                format: timestamp
              description: Number of seconds in which the current rate limit window resets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/accounts/{accountId}/devices:
    get:
      summary: Get all devices connected to a user
      description: List all devices (and their sensor abilities) connected to a user’s account. The data returned by this endpoint changes when a device is registered, unregistered or renamed.
      operationId: getDevices
      parameters:
        - $ref: '#/components/parameters/accountId'
      tags:
        - Device
      security:
        - bearerAuth: [ ]
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicesResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/accounts:
    get:
      summary: List all accounts the current user is member of
      description: Lists all accounts the current user is member of. The data returned by this endpoint changes when a user is added or removed from business accounts. It is safe to assume that the accountId remains constant for Consumer users. The accountId returned by this endpoint is used to fetch the devices and sensors from the other endpoints.
      operationId: getAccountsIds
      tags:
        - Accounts
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/accounts/{accountId}/devices/{sn}/remote-control:
    put:
      summary: Set remote control mode for a Renew device
      description: |
        Set the operational mode of a Renew (AP_1) air purifier.

        **Available modes:**
        | Mode | Description |
        |------|-------------|
        | `OFF` | Turn off the air purifier |
        | `AUTO` | Automatically adjusts fan speed based on air quality measured by the built-in laser PM sensor |
        | `SLEEP` | Runs at low speed for 8 hours at a whisper-quiet 23 dB; dims the control panel |
        | `BOOST` | Runs at maximum fan speed for 60 minutes for rapid air purification |
        | `MANUAL` | Fixed fan speed set by `fanSpeed` (1 = lowest / quietest, 5 = highest) |

        The command is forwarded to the device asynchronously. Use the GET endpoint to confirm the device has applied the new mode.
      operationId: setRemoteControl
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/deviceSerialNumber'
      tags:
        - Remote Control
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoteControlRequest'
            examples:
              off:
                summary: Turn off
                value:
                  mode: OFF
              auto:
                summary: Automatic mode
                value:
                  mode: AUTO
              sleep:
                summary: Sleep mode
                value:
                  mode: SLEEP
              boost:
                summary: Boost mode
                value:
                  mode: BOOST
              manual:
                summary: Manual fan speed (level 3 of 5)
                value:
                  mode: MANUAL
                  fanSpeed: 3
      responses:
        200:
          description: Mode successfully queued for the device
        400:
          description: Bad request — unsupported device type, unknown mode, or missing `fanSpeed` for MANUAL mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "fanSpeed is required for MANUAL mode"
        403:
          description: Forbidden (user does not own the device)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        429:
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Get remote control state of a Renew device
      description: |
        Get the last reported operational mode of a Renew (AP_1) air purifier.

        The state reflects what the device last reported, not necessarily the command last sent.
        If the device has never synced a mode, a `404` is returned.
      operationId: getRemoteControl
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/deviceSerialNumber'
      tags:
        - Remote Control
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoteControlResponse'
              examples:
                auto:
                  summary: Device is in AUTO mode
                  value:
                    mode: AUTO
                manual:
                  summary: Device is in MANUAL mode at fan speed 3
                  value:
                    mode: MANUAL
                    fanSpeed: 3
                off:
                  summary: Device is off
                  value:
                    mode: OFF
        400:
          description: Bad request — unsupported device type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Forbidden (user does not own the device)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: The device has not yet reported a remote control state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Device 4100007329 has no remote control state. The device may not have synced yet."
        429:
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/health:
    get:
      summary: Get the health of the API
      operationId: getHealth
      tags:
        - Health
      responses:
        200:
          description: OK
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          description: A message detailing the error encountered
    SensorsResponse:
      type: object
      properties:
        serialNumber:
          type: string
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/SensorResponse'
        recorded:
          type: string
          nullable: true
        batteryPercentage:
          type: integer
          nullable: true
    SensorResponse:
      type: object
      nullable: true
      properties:
        sensorType:
          type: string
        value:
          type: number
          format: double
        unit:
          type: string
    AccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
    AccountResponse:
      type: object
      properties:
        id:
          type: string
    DevicesResponse:
      type: object
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceResponse'
    DeviceResponse:
      type: object
      properties:
        serialNumber:
          type: string
        home:
          type: string
          nullable: true
        name:
          type: string
        type:
          type: string
        sensors:
          type: array
          items:
            type: string
    RemoteControlRequest:
      oneOf:
        - $ref: '#/components/schemas/RemoteControlOffRequest'
        - $ref: '#/components/schemas/RemoteControlAutoRequest'
        - $ref: '#/components/schemas/RemoteControlSleepRequest'
        - $ref: '#/components/schemas/RemoteControlBoostRequest'
        - $ref: '#/components/schemas/RemoteControlManualRequest'
      discriminator:
        propertyName: mode
        mapping:
          OFF: '#/components/schemas/RemoteControlOffRequest'
          AUTO: '#/components/schemas/RemoteControlAutoRequest'
          SLEEP: '#/components/schemas/RemoteControlSleepRequest'
          BOOST: '#/components/schemas/RemoteControlBoostRequest'
          MANUAL: '#/components/schemas/RemoteControlManualRequest'
    RemoteControlResponse:
      oneOf:
        - $ref: '#/components/schemas/RemoteControlOffResponse'
        - $ref: '#/components/schemas/RemoteControlAutoResponse'
        - $ref: '#/components/schemas/RemoteControlSleepResponse'
        - $ref: '#/components/schemas/RemoteControlBoostResponse'
        - $ref: '#/components/schemas/RemoteControlManualResponse'
      discriminator:
        propertyName: mode
        mapping:
          OFF: '#/components/schemas/RemoteControlOffResponse'
          AUTO: '#/components/schemas/RemoteControlAutoResponse'
          SLEEP: '#/components/schemas/RemoteControlSleepResponse'
          BOOST: '#/components/schemas/RemoteControlBoostResponse'
          MANUAL: '#/components/schemas/RemoteControlManualResponse'
    RemoteControlOffRequest:
      type: object
      description: Turn off the air purifier
      required: [mode]
      properties:
        mode:
          type: string
          enum: [OFF]
    RemoteControlAutoRequest:
      type: object
      description: Automatically adjusts fan speed based on air quality measured by the built-in laser PM sensor
      required: [mode]
      properties:
        mode:
          type: string
          enum: [AUTO]
    RemoteControlSleepRequest:
      type: object
      description: Runs at low speed for 8 hours at a whisper-quiet 23 dB; dims the control panel for nighttime use
      required: [mode]
      properties:
        mode:
          type: string
          enum: [SLEEP]
    RemoteControlBoostRequest:
      type: object
      description: Runs at maximum fan speed for 60 minutes for rapid air purification
      required: [mode]
      properties:
        mode:
          type: string
          enum: [BOOST]
    RemoteControlManualRequest:
      type: object
      description: Fixed fan speed controlled manually
      required: [mode, fanSpeed]
      properties:
        mode:
          type: string
          enum: [MANUAL]
        fanSpeed:
          type: integer
          minimum: 1
          maximum: 5
          description: Fan speed level — 1 (lowest / quietest) to 5 (highest)
    RemoteControlOffResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [OFF]
    RemoteControlAutoResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [AUTO]
    RemoteControlSleepResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [SLEEP]
    RemoteControlBoostResponse:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [BOOST]
    RemoteControlManualResponse:
      type: object
      required: [mode, fanSpeed]
      properties:
        mode:
          type: string
          enum: [MANUAL]
        fanSpeed:
          type: integer
          minimum: 1
          maximum: 5
          description: Fan speed level — 1 (lowest / quietest) to 5 (highest)
  parameters:
    accountId:
      name: accountId
      in: path
      required: true
      description: The account ID associated with the user
      schema:
        type: string
    deviceSerialNumber:
      name: sn
      in: path
      required: true
      description: The serial number of the device
      schema:
        type: string
    deviceSerialNumbers:
      name: sn
      in: query
      required: false
      description: The serial numbers of the devices
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
    pageNumber:
      name: pageNumber
      in: query
      required: false
      description: The number of a page (of 50 records) to fetch
      schema:
        type: integer
        default: 1
    unit:
      name: unit
      in: query
      required: false
      description: The units type sensors values will be returned in
      schema:
        type: string
        enum:
          - metric
          - imperial
        default: metric
